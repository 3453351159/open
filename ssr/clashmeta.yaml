  - {"name":"ip1","type":"tuic","server":"tuic3.dtku47.xyz","port":13579,"udp":true,"uuid":"e8829e2c-030f-477c-badd-a6817d0e4ff3","password":c9oG5brYoLUd,"alpn":["h3"],"disable-sni":true,"reduce-rtt":true,"udp-relay-mode":native,"congestion-controller":"bbr"}
  - {"name":"ip2","type":"hysteria","server":"108.181.22.205","port":32645,"sni":"bing.com","skip-cert-verify":true,"alpn":["h3"],"protocol":"udp","auth_str":"A5KdgNc7C69fuGw3my7FYyJnDVj55rwxLCIU70ObVCXRzHhEit","up":11,"down":55}
